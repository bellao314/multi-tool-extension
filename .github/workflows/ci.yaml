name: CI

on:
  push:
    branches: 
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "lts/*"

      - name: Install JavaScript Dependencies
        working-directory: ./src
        run: npm install

      - name: Run Tests
        working-directory: multi-tool-extension
        run: npm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "lts/*"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install docker-compose

      - name: Install JavaScript Dependencies
        working-directory: multi-tool-extension
        run: npm install

      - name: Run ESLint
        working-directory: multi-tool-extension
        run: npm run lint

